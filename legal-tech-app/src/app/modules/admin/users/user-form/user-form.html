<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <div class="flex flex-col gap-2">
        <label for="fullName" class="font-semibold text-slate-700">Nombre Completo</label>
        <input pInputText id="fullName" formControlName="fullName" placeholder="Ej. Juan Pérez" />
        <small class="text-red-500" *ngIf="userForm.get('fullName')?.invalid && userForm.get('fullName')?.touched">
            Requerido
        </small>
    </div>

    <div class="flex flex-col gap-2">
        <label for="email" class="font-semibold text-slate-700">Email</label>
        <input pInputText id="email" type="email" formControlName="email" placeholder="email@ejemplo.com" />
        <small class="text-red-500" *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">
            Email válido requerido
        </small>
    </div>

    <div class="flex flex-col gap-2">
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Contraseña {{ userToEdit ?
            '(Opcional)' : '' }}</label>
        <input pInputText id="password" type="password" formControlName="password" class="w-full"
            [placeholder]="userToEdit ? 'Dejar en blanco para mantener' : '******'" />
        <small class="text-red-500" *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched">
            Mínimo 6 caracteres
        </small>
    </div>

    <div class="flex flex-col gap-2">
        <label for="role" class="font-semibold text-slate-700">Rol</label>
        <p-select [options]="roles" formControlName="role" optionLabel="label" optionValue="value"
            [style]="{'width':'100%'}"></p-select>
    </div>

    <!-- Modificadores de Suscripción -->
    <div class="flex flex-col gap-2 border-t pt-4 mt-2 border-slate-200">
        <label class="font-semibold text-slate-800 text-lg">Control de Suscripción</label>
        <p class="text-sm text-slate-500 mb-2">Modificar manualmente el estado de un usuario para soporte.</p>
        
        <label for="subscriptionStatus" class="font-semibold text-slate-700">Estado de Plan</label>
        <p-select [options]="subscriptionStatuses" formControlName="subscriptionStatus" optionLabel="label" optionValue="value"
            [style]="{'width':'100%'}"></p-select>
    </div>

    <div class="flex flex-col gap-2">
        <label for="subscriptionExpiresAt" class="font-semibold text-slate-700">Vencimiento Manual</label>
        <input pInputText type="date" id="subscriptionExpiresAt" formControlName="subscriptionExpiresAt" />
        <small class="text-slate-500">
            Dejar en blanco para mantener dinámico o indefinido.
        </small>
    </div>

    <div class="flex justify-end gap-2 mt-6">
        <p-button label="Cancelar" styleClass="p-button-secondary p-button-text"
            (onClick)="userForm.reset()"></p-button>
        <p-button [label]="userToEdit ? 'Guardar Cambios' : 'Crear Usuario'" [loading]="loading" (onClick)="onSubmit()"
            [disabled]="userForm.invalid"></p-button>
    </div>
</form>
