<div
    class="min-h-screen bg-[var(--surface-sand)] flex flex-col justify-center py-12 sm:px-6 lg:px-8 transition-colors">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center">
            <div class="bg-[var(--accent-terracotta)] text-white p-4 rounded-full shadow-lg">
                <i class="pi pi-briefcase text-3xl"></i>
            </div>
        </div>
        <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-[var(--text-earth)] font-serif-organic">
            Themis
        </h2>
        <p class="mt-2 text-center text-sm text-[var(--text-earth)]/80">
            Sistema de Gestión Integral
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div
            class="bg-white dark:bg-slate-800 py-8 px-4 shadow-xl shadow-slate-200 dark:shadow-slate-900/50 sm:rounded-lg sm:px-10 border border-slate-100 dark:border-slate-700">
            <h3 class="text-xl font-medium text-slate-700 dark:text-slate-200 mb-6 text-center">Iniciar Sesión</h3>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

                <!-- Email Mode -->
                <div class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300"> Correo
                            Electrónico </label>
                        <div class="mt-1">
                            <p-inputGroup>
                                <p-inputGroupAddon
                                    styleClass="bg-slate-50 dark:bg-slate-700 border-slate-300 dark:border-slate-600">
                                    <i class="pi pi-envelope text-slate-500 dark:text-slate-400"></i>
                                </p-inputGroupAddon>
                                <input id="email" type="email" formControlName="email" pInputText
                                    class="dark:bg-slate-700 dark:text-white dark:border-slate-600"
                                    placeholder="usuario@estudio.com" />
                            </p-inputGroup>
                        </div>
                        <small *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                            class="text-red-500 dark:text-red-400 text-xs mt-1">
                            Ingrese un correo válido.
                        </small>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">
                            Contraseña </label>
                        <div class="mt-1">
                            <p-inputGroup>
                                <p-inputGroupAddon
                                    styleClass="bg-slate-50 dark:bg-slate-700 border-slate-300 dark:border-slate-600">
                                    <i class="pi pi-lock text-slate-500 dark:text-slate-400"></i>
                                </p-inputGroupAddon>
                                <input id="password" type="password" formControlName="password" pInputText
                                    class="dark:bg-slate-700 dark:text-white dark:border-slate-600"
                                    placeholder="••••••••" />
                            </p-inputGroup>
                            <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                                class="text-red-500 dark:text-red-400 text-xs mt-1">
                                Ingrese su contraseña.
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div>
                    <button pButton type="submit" label="Iniciar Sesión" [loading]="loading" [disabled]="loading"
                        class="w-full disabled:opacity-70 disabled:cursor-not-allowed">
                    </button>
                </div>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white dark:bg-slate-800">
                            <a routerLink="/auth/forgot-password"
                                class="text-[var(--accent-terracotta)] hover:text-[var(--accent-moss)] transition-colors hover:underline font-medium text-sm">
                                ¿Olvidaste tu contraseña?
                            </a>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
