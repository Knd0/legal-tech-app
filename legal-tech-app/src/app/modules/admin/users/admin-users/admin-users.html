<div class="card p-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-slate-800">Gestión de Usuarios</h2>
        <p-button label="Nuevo Usuario" icon="pi pi-plus" (onClick)="openCreateDialog()"></p-button>
    </div>

    <p-table [value]="users" [tableStyle]="{ 'min-width': '50rem' }" styleClass="p-datatable-striped">
        <ng-template pTemplate="header">
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-user>
            <tr>
                <td>{{ user.fullName }}</td>
                <td>{{ user.email }}</td>
                <td>
                    <span
                        [class]="'px-2 py-1 rounded text-xs font-bold ' + (user.role === 'ADMIN' ? 'bg-purple-100 text-purple-800' : 'bg-blue-100 text-blue-800')">
                        {{ user.role }}
                    </span>
                </td>
                <td>
                    <span
                        [class]="'px-2 py-1 rounded text-xs font-bold ' + (user.isActive ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800')">
                        {{ user.isActive ? 'ACTIVO' : 'SUSPENDIDO' }}
                    </span>
                </td>
                <td class="flex gap-2">
                    <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info" pTooltip="Editar"
                        (onClick)="editUser(user)"></p-button>

                    <p-button [icon]="user.isActive ? 'pi pi-ban' : 'pi pi-check'" [rounded]="true" [text]="true"
                        [severity]="$any(getSeverity(user.isActive))"
                        pTooltip="{{ user.isActive ? 'Suspender' : 'Activar' }}" (onClick)="toggleSuspension(user)">
                    </p-button>

                    <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" pTooltip="Eliminar"
                        (onClick)="deleteUser(user)"></p-button>
                </td>
            </tr>
        </ng-template>
    </p-table>

    <p-dialog [header]="headerText" [(visible)]="displayCreateDialog" [modal]="true" [style]="{ width: '40vw' }">
        <app-user-form [userToEdit]="selectedUser" (userCreated)="onUserCreated()"
            (userUpdated)="onUserUpdated()"></app-user-form>
    </p-dialog>

    <p-toast></p-toast>
</div>
