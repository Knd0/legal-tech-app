<div class="min-h-screen bg-[var(--surface-sand)] flex flex-col justify-center py-12 sm:px-6 lg:px-8 transition-colors">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
      <div class="bg-[var(--accent-terracotta)] text-white p-4 rounded-full shadow-lg">
        <i class="pi pi-briefcase text-3xl"></i>
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-[var(--text-earth)] font-serif-organic">
      Themis
    </h2>
    <p class="mt-2 text-center text-sm text-[var(--text-earth)]/80">
      Sistema de Gestión Integral
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white dark:bg-slate-800 py-8 px-4 shadow-xl shadow-slate-200 dark:shadow-slate-900/50 sm:rounded-lg sm:px-10 border border-slate-100 dark:border-slate-700">
      <h3 class="text-xl font-medium text-slate-700 dark:text-slate-200 mb-6 text-center">Crear Cuenta</h3>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Nombre Completo</label>
          <p-inputGroup>
            <p-inputGroupAddon styleClass="bg-slate-50 dark:bg-slate-700 border-slate-300 dark:border-slate-600">
              <i class="pi pi-user text-slate-500 dark:text-slate-400"></i>
            </p-inputGroupAddon>
            <input pInputText type="text" formControlName="fullName" placeholder="Dr. Juan Pérez" class="w-full dark:bg-slate-700 dark:text-white dark:border-slate-600" />
          </p-inputGroup>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Correo Electrónico</label>
          <p-inputGroup>
            <p-inputGroupAddon styleClass="bg-slate-50 dark:bg-slate-700 border-slate-300 dark:border-slate-600">
              <i class="pi pi-envelope text-slate-500 dark:text-slate-400"></i>
            </p-inputGroupAddon>
            <input pInputText type="email" formControlName="email" placeholder="abogado@estudio.com" class="w-full dark:bg-slate-700 dark:text-white dark:border-slate-600" />
          </p-inputGroup>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Teléfono / WhatsApp (Opcional)</label>
          <p-inputGroup>
            <p-inputGroupAddon styleClass="bg-slate-50 dark:bg-slate-700 border-slate-300 dark:border-slate-600">
              <i class="pi pi-phone text-slate-500 dark:text-slate-400"></i>
            </p-inputGroupAddon>
            <input pInputText type="text" formControlName="phoneNumber" placeholder="+54 9 11 1234 5678" class="w-full dark:bg-slate-700 dark:text-white dark:border-slate-600" />
          </p-inputGroup>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Contraseña</label>
          <p-inputGroup>
            <p-inputGroupAddon styleClass="bg-slate-50 dark:bg-slate-700 border-slate-300 dark:border-slate-600">
              <i class="pi pi-lock text-slate-500 dark:text-slate-400"></i>
            </p-inputGroupAddon>
            <input pInputText type="password" formControlName="password" placeholder="••••••••" class="w-full dark:bg-slate-700 dark:text-white dark:border-slate-600" />
          </p-inputGroup>
          <small class="text-slate-500 dark:text-slate-400 text-xs mt-1 block">
            Mínimo 8 caracteres, una mayúscula y un número.
          </small>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Confirmar Contraseña</label>
          <p-inputGroup>
            <p-inputGroupAddon styleClass="bg-slate-50 dark:bg-slate-700 border-slate-300 dark:border-slate-600">
              <i class="pi pi-lock text-slate-500 dark:text-slate-400"></i>
            </p-inputGroupAddon>
            <input pInputText type="password" formControlName="confirmPassword" placeholder="••••••••" class="w-full dark:bg-slate-700 dark:text-white dark:border-slate-600" />
          </p-inputGroup>
        </div>

        <div>
          <button pButton type="submit" label="Registrarse" [loading]="loading()" [disabled]="loading() || registerForm.invalid"
            class="w-full disabled:opacity-50 disabled:cursor-not-allowed">
          </button>
        </div>
      </form>

      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white dark:bg-slate-800 text-sm text-slate-500 dark:text-slate-400">
              ¿Ya tienes una cuenta?
              <a routerLink="/auth/login" class="font-medium text-[var(--accent-terracotta)] hover:text-[var(--accent-moss)] transition-colors hover:underline ml-1">
                Iniciar sesión
              </a>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
