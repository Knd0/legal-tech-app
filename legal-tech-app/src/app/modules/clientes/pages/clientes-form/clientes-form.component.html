<div class="max-w-4xl mx-auto pb-20 md:pb-8">

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-900">
            {{ isEditMode() ? 'Editar Cliente' : 'Nuevo Cliente' }}
        </h1>
        <p class="text-slate-500 mt-1 text-sm">
            Gestione la información personal y de contacto del cliente.
        </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- Main Card -->
        <div class="card-pro bg-white p-6 md:p-8 space-y-8">

            <!-- SECTION 1: DATOS PERSONALES -->
            <div>
                <h3
                    class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">
                    <i class="pi pi-user mr-2"></i>Datos Personales
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <!-- Nombre (Span 6) -->
                    <div class="md:col-span-6 flex flex-col gap-2">
                        <label for="nombre" class="text-sm font-semibold text-slate-700">Nombre</label>
                        <input pInputText id="nombre" formControlName="nombre" class="w-full" placeholder="Ej: Juan" />
                    </div>

                    <!-- Apellido (Span 6) -->
                    <div class="md:col-span-6 flex flex-col gap-2">
                        <label for="apellido" class="text-sm font-semibold text-slate-700">Apellido</label>
                        <input pInputText id="apellido" formControlName="apellido" class="w-full"
                            placeholder="Ej: Perez" />
                    </div>

                    <!-- DNI (Span 4) -->
                    <div class="md:col-span-4 flex flex-col gap-2">
                        <label for="dni" class="text-sm font-semibold text-slate-700">DNI</label>
                        <input pInputText id="dni" formControlName="dni" class="w-full" placeholder="Sin puntos" />
                    </div>

                    <!-- CUIT (Span 4) -->
                    <div class="md:col-span-4 flex flex-col gap-2">
                        <label for="cuit" class="text-sm font-semibold text-slate-700">CUIT</label>
                        <input pInputText id="cuit" formControlName="cuit" class="w-full"
                            placeholder="Ej: 20-12345678-9" />
                    </div>

                    <!-- Fecha Nacimiento (Span 4) -->
                    <div class="md:col-span-4 flex flex-col gap-2">
                        <label for="fechaNacimiento" class="text-sm font-semibold text-slate-700">Fecha de
                            Nacimiento</label>
                        <p-datepicker id="fechaNacimiento" formControlName="fechaNacimiento" dateFormat="dd/mm/yy"
                            [showIcon]="true" styleClass="w-full" appendTo="body"></p-datepicker>
                    </div>

                    <!-- Ocupacion (Span 12) -->
                    <div class="md:col-span-12 flex flex-col gap-2">
                        <label for="ocupacion" class="text-sm font-semibold text-slate-700">Ocupación</label>
                        <input pInputText id="ocupacion" formControlName="ocupacion" class="w-full"
                            placeholder="Ej: Empleado de Comercio" />
                    </div>
                </div>
            </div>

            <!-- SECTION 2: CONTACTO -->
            <div>
                <h3
                    class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2 mt-2">
                    <i class="pi pi-envelope mr-2"></i>Información de Contacto
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Email -->
                    <div class="flex flex-col gap-2">
                        <label for="email" class="text-sm font-semibold text-slate-700">Correo Electrónico</label>
                        <input pInputText id="email" formControlName="email" type="email" class="w-full"
                            placeholder="ejemplo@email.com" />
                    </div>

                    <!-- Telefono -->
                    <div class="flex flex-col gap-2">
                        <label for="telefono" class="text-sm font-semibold text-slate-700">Teléfono / Celular</label>
                        <input pInputText id="telefono" formControlName="telefono" class="w-full"
                            placeholder="+54 9 11..." />
                    </div>

                    <!-- Domicilio (Full Width) -->
                    <div class="md:col-span-2 flex flex-col gap-2">
                        <label for="domicilio" class="text-sm font-semibold text-slate-700">Domicilio</label>
                        <input pInputText id="domicilio" formControlName="domicilio" class="w-full"
                            placeholder="Calle, Altura, Localidad" />
                    </div>
                </div>
            </div>

            <!-- SECTION 3: NOTAS -->
            <div>
                <h3
                    class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2 mt-2">
                    <i class="pi pi-align-left mr-2"></i>Notas Internas
                </h3>
                <textarea pTextarea id="observaciones" formControlName="observaciones" rows="3" class="w-full"
                    placeholder="Comentarios adicionales sobre el cliente..."></textarea>
            </div>
        </div>

        <!-- ACTIONS FOOTER -->
        <div class="mt-6 flex flex-col md:flex-row justify-end gap-3">
            <button pButton label="Cancelar" icon="pi pi-times" [routerLink]="['/clientes']"
                class="p-button-outlined w-full md:w-auto"></button>
            <button pButton label="Guardar Cliente" icon="pi pi-check" type="submit" [disabled]="form.invalid"
                class="w-full md:w-auto shadow-lg"></button>
        </div>

    </form>
</div>
