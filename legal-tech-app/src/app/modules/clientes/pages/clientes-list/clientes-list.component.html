<div class="flex flex-col gap-6 pb-10">
    <div class="flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Clientes</h1>
            <p class="text-slate-500 text-sm mt-1">Gestión de cartera y contactos.</p>
        </div>
        <div class="flex gap-2">
            <button pButton label="Exportar" icon="pi pi-file-excel" (click)="exportList()"
                class="p-button-outlined p-button-success"></button>
            <button pButton label="Importar" icon="pi pi-upload" (click)="triggerImport()"
                class="p-button-outlined p-button-help"></button>
            <input type="file" id="importInput" (change)="onFileChange($event)" accept=".xlsx, .xls" class="hidden">

            <button pButton label="Nuevo Cliente" icon="pi pi-plus" [routerLink]="['new']"
                class="bg-blue-900 border-blue-900 hover:bg-blue-800 shadow-sm"></button>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <p-table [value]="clientes()" [tableStyle]="{ 'min-width': '50rem' }" styleClass="p-datatable-sm"
            [paginator]="true" [rows]="10" [showCurrentPageReport]="true"
            currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords}">

            <ng-template pTemplate="header">
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="font-bold text-slate-600 text-xs uppercase tracking-wider py-4 px-6">Cliente</th>
                    <th class="font-bold text-slate-600 text-xs uppercase tracking-wider py-4 px-6">DNI</th>
                    <th class="font-bold text-slate-600 text-xs uppercase tracking-wider py-4 px-6">Contacto</th>
                    <th class="font-bold text-slate-600 text-xs uppercase tracking-wider py-4 px-6">Fecha Alta</th>
                    <th class="font-bold text-slate-600 text-xs uppercase tracking-wider py-4 px-6 text-right">Acciones
                    </th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-cliente>
                <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">
                    <td class="py-3 px-6 font-semibold text-slate-800">{{ cliente.apellido }}, {{ cliente.nombre }}</td>
                    <td class="py-3 px-6 text-slate-600 text-sm">{{ cliente.dni }}</td>
                    <td class="py-3 px-6 text-slate-600 text-sm">{{ cliente.telefono }}</td>
                    <td class="py-3 px-6 text-slate-600 text-sm">{{ cliente.fechaAlta | date:'dd/MM/yyyy' }}</td>
                    <td class="py-3 px-6 text-right">
                        <button pButton icon="pi pi-eye"
                            class="p-button-rounded p-button-text p-button-sm text-slate-400 hover:text-blue-600 hover:bg-blue-50"
                            [routerLink]="[cliente.id]" pTooltip="Ver Detalle" tooltipPosition="top"></button>
                        <button pButton icon="pi pi-pencil"
                            class="p-button-rounded p-button-text p-button-sm text-slate-400 hover:text-amber-600 hover:bg-amber-50"
                            [routerLink]="[cliente.id, 'edit']" pTooltip="Editar" tooltipPosition="top"></button>
                        <button pButton icon="pi pi-whatsapp"
                            class="p-button-rounded p-button-text p-button-sm text-slate-400 hover:text-green-600 hover:bg-green-50"
                            (click)="sendWhatsapp(cliente)" pTooltip="Enviar WhatsApp" tooltipPosition="top"></button>
                        <button pButton icon="pi pi-trash"
                            class="p-button-rounded p-button-text p-button-sm text-slate-400 hover:text-red-600 hover:bg-red-50"
                            (click)="clientService.deleteClient(cliente.id)" pTooltip="Eliminar"
                            tooltipPosition="top"></button>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="5" class="text-center py-10 text-slate-500">
                        <div class="flex flex-col items-center gap-3">
                            <i class="pi pi-users text-3xl text-slate-300"></i>
                            <span class="text-sm font-medium">No hay clientes registrados.</span>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
