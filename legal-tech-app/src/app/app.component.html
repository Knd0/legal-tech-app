<div class="min-h-screen bg-slate-50 font-sans text-slate-900 pb-0 flex flex-col">

  <nav *ngIf="authService.isAuthenticated()"
    class="bg-white border-b border-slate-200 fixed w-full top-0 z-50 h-16 px-6 flex justify-between items-center">

    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-900 rounded-lg flex items-center justify-center shadow-sm">
        <i class="pi pi-shield text-lg text-white"></i>
      </div>
      <span class="font-bold text-lg tracking-tight text-slate-800">LegalTech</span>
    </div>

    <div class="hidden md:flex items-center gap-8">
      <a routerLink="/" routerLinkActive="text-blue-900 font-semibold border-b-2 border-blue-900"
        [routerLinkActiveOptions]="{exact: true}"
        class="text-sm font-medium text-slate-500 hover:text-blue-900 h-16 flex items-center transition-colors">Inicio</a>
      <a routerLink="/clientes" routerLinkActive="text-blue-900 font-semibold border-b-2 border-blue-900"
        class="text-sm font-medium text-slate-500 hover:text-blue-900 h-16 flex items-center transition-colors">Clientes</a>
      <a routerLink="/expedientes" routerLinkActive="text-blue-900 font-semibold border-b-2 border-blue-900"
        class="text-sm font-medium text-slate-500 hover:text-blue-900 h-16 flex items-center transition-colors">Expedientes</a>
      <a routerLink="/calendario" routerLinkActive="text-blue-900 font-semibold border-b-2 border-blue-900"
        class="text-sm font-medium text-slate-500 hover:text-blue-900 h-16 flex items-center transition-colors">Calendario</a>
    </div>

    <div class="flex items-center gap-5">
      <div class="relative cursor-pointer" pTooltip="Notificaciones" tooltipPosition="bottom">
        <i class="pi pi-bell text-slate-500 text-lg hover:text-slate-800 transition-colors"></i>
        <span class="absolute -top-1 -right-1 flex h-2.5 w-2.5">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
        </span>
      </div>

      <div class="flex items-center gap-3 pl-5 border-l border-slate-200">
        <div class="flex flex-col text-right hidden sm:flex">
          <span class="text-xs font-bold text-slate-700">{{ (authService.currentUser()?.fullName) || 'Usuario' }}</span>
          <span class="text-[10px] text-slate-400 capitalize">{{ (authService.currentUser()?.role) || 'Abogado'
            }}</span>
        </div>
        <div class="relative group">
          <button
            class="flex items-center text-sm font-medium text-slate-500 hover:text-slate-700 focus:outline-none transition duration-150 ease-in-out">
            <span class="sr-only">Open user menu</span>
            <div
              class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold border border-indigo-200">
              {{ authService.currentUser()?.fullName?.charAt(0) || 'U' }}
            </div>
            <i class="ml-1 pi pi-angle-down"></i>
          </button>

          <!-- Dropdown menu -->
          <div class="absolute right-0 pt-2 w-48 hidden group-hover:block hover:block z-50">
            <div class="bg-white rounded-md shadow-lg py-1 border border-slate-100">
              <div class="px-4 py-2 text-xs text-slate-500 border-b border-slate-100 truncate">
                {{ authService.currentUser()?.email }}
              </div>

              <a routerLink="/profile" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer">
                <i class="pi pi-user mr-2 text-slate-400"></i> Mi Perfil
              </a>

              <a routerLink="/ayuda" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer">
                <i class="pi pi-question-circle mr-2 text-slate-400"></i> Ayuda
              </a>

              <div class="border-t border-slate-100 my-1"></div>

              <a (click)="authService.logout()"
                class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 cursor-pointer">
                <i class="pi pi-sign-out mr-2"></i> Cerrar Sesión
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main [class.pt-24]="authService.isAuthenticated()" class="container mx-auto px-4 md:px-6 max-w-7xl flex-grow">
    <router-outlet></router-outlet>
  </main>

  <app-footer *ngIf="authService.isAuthenticated()"></app-footer>

</div>
